name: Build and Publish Papers

on:
  push:
    branches:
      - main
    paths:
      - "papers/**/*.md"
      - "templates/**"
      - "Makefile"
      - ".github/workflows/build-and-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build PDFs and site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra

      - name: Build all papers
        run: make all

      - name: Generate RDF catalog
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: |
          python3 << 'PYEOF'
          import os, re

          papers_dir = 'papers'
          base_url = os.environ['BASE_URL']

          NS_DCAT = 'https://www.w3.org/ns/dcat#'
          NS_DCT  = 'http://purl.org/dc/terms/'

          entries = []
          for name in sorted(os.listdir(papers_dir)):
              md_path = os.path.join(papers_dir, name, f'{name}.md')
              if os.path.isfile(md_path):
                  with open(md_path) as f:
                      content = f.read()
                  m = re.search(r'^---\n(.*?)\n---', content, re.DOTALL)
                  title = name
                  if m:
                      for line in m.group(1).splitlines():
                          tm = re.match(r'^title:\s*(?:"(.*?)"|\'(.*?)\'|(.*?))\s*$', line)
                          if tm:
                              title = next(g for g in tm.groups() if g is not None)
                              break
                  entries.append((name, title))

          lines = [
              f'@prefix dcat: <{NS_DCAT}> .',
              f'@prefix dct:  <{NS_DCT}> .',
              '',
              f'<{base_url}/> a dcat:Catalog ;',
              '    dct:title "Papers"@en ;',
              '    dct:description "A collection of published academic papers."@en ;',
          ]
          for i, (name, title) in enumerate(entries):
              url = f'{base_url}/{name}/{name}.pdf'
              sep = ' ;' if i < len(entries) - 1 else ' .'
              lines.append(f'    dcat:dataset <{url}>{sep}')

          for name, title in entries:
              url = f'{base_url}/{name}/{name}.pdf'
              escaped_title = title.replace('\\', '\\\\').replace('"', '\\"')
              lines += [
                  '',
                  f'<{url}> a dcat:Dataset ;',
                  f'    dct:title "{escaped_title}"@en ;',
                  f'    dcat:distribution [',
                  f'        a dcat:Distribution ;',
                  f'        dcat:accessURL <{url}> ;',
                  f'        dcat:mediaType "application/pdf"',
                  f'    ] .',
              ]

          os.makedirs('build', exist_ok=True)
          with open('build/catalog.ttl', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print(f'Generated catalog.ttl with {len(entries)} paper(s)')
          PYEOF

      - name: Generate index page
        run: |
          mkdir -p build
          cat > build/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Papers</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
              ul { list-style: none; padding: 0; }
              li { margin: 12px 0; }
              a { color: #0366d6; text-decoration: none; font-size: 1.1em; }
              a:hover { text-decoration: underline; }
              .meta { color: #666; font-size: 0.9em; margin-left: 8px; }
            </style>
          </head>
          <body>
            <h1>Papers</h1>
            <ul>
          HTML

          # Add a link for each paper PDF found in build/ (skip intermediate files like input.pdf)
          for dir in build/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            pdf="${dir}${name}.pdf"
            if [ -f "$pdf" ]; then
              rel="${pdf#build/}"
              echo "      <li><a href=\"${rel}\">${name}</a></li>" >> build/index.html
            fi
          done

          cat >> build/index.html << 'HTML'
            </ul>
            <p><a href="catalog.ttl">RDF catalog (Turtle)</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
